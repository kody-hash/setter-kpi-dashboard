name: Analyze a day's outbound SMS

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "Phoenix date YYYY-MM-DD"
        required: true
        type: string

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run
        env:
          GHL_TOKEN: ${{ secrets.GHL_TOKEN }}
          GHL_LOCATION_ID: ${{ secrets.GHL_LOCATION_ID }}
          TARGET_DATE: ${{ inputs.target_date }}
        run: node scripts/analyze-day.js
      - name: Commit
        env:
          TARGET_DATE: ${{ inputs.target_date }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "analyze-${TARGET_DATE}.json"
          git diff --staged --quiet || git commit -m "analyze: ${TARGET_DATE}"
          git push
